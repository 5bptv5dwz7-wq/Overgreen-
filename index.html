<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#075b31"><meta name="apple-mobile-web-app-capable" content="yes"><link rel="manifest" href="manifest.json?v=9"><link rel="apple-touch-icon" href="icon-192.png"><link rel="stylesheet" href="style.css?v=9"><title>Overgreen</title></head><body>
<section id="loginScreen" class="auth-screen"><div class="auth-card"><div class="logo">OG</div><p class="eyebrow">OVERGREEN</p><h1>Gestione punti vendita</h1><p class="muted">Accedi con email e password.</p><form id="loginForm"><label>Email<input id="loginEmail" type="email" autocomplete="username" required></label><label>Password<input id="loginPassword" type="password" autocomplete="current-password" required></label><button type="submit" class="full">Accedi</button><p id="loginError" class="error hidden"></p></form></div></section>
<div id="app" class="hidden"><header><div><p class="eyebrow">OVERGREEN</p><h1 id="pageTitle">Punti vendita</h1><small id="userLabel" class="muted"></small></div><div class="header-actions"><button class="icon" data-view="stores" title="Punti vendita">🏪</button><button class="icon" data-view="schedule" title="Programmazione">📅</button><button class="icon" data-view="extras" title="Extra">E</button><button id="pendingBtn" class="icon admin-only" title="Convalide">✓<span id="pendingBadge" class="badge hidden">0</span></button><button class="icon" data-view="settings" title="Impostazioni">⚙</button></div></header>
<main>
<section id="storesView" class="view"><section class="summary"><button data-filter="all"><strong id="totalCount">0</strong><span>Totali</span></button><button class="danger" data-filter="due"><strong id="dueCount">0</strong><span>Scaduti</span></button><button class="warning" data-filter="warning"><strong id="warningCount">0</strong><span>In scadenza</span></button><button class="success" data-filter="today"><strong id="todayCount">0</strong><span>Fatti oggi</span></button></section><div class="toolbar"><input id="searchInput" type="search" placeholder="Cerca punto vendita…"><select id="sortSelect"><option value="urgent">Più urgenti</option><option value="alpha">Alfabetico</option></select></div><button id="addStoreBtn" class="full admin-only">＋ Aggiungi punto vendita</button><div id="storesList" class="cards"></div></section>
<section id="scheduleView" class="view hidden"><div id="scheduleTitle" class="panel"><h2>Programmazione</h2></div><section class="panel admin-only"><form id="scheduleForm"><label>Giorno<input id="scheduleDate" type="date" required></label><fieldset><legend>Squadra</legend><div id="scheduleWorkers" class="check-grid"></div></fieldset><label>Nota<textarea id="scheduleNote"></textarea></label><input id="scheduleSearch" type="search" placeholder="Cerca punti vendita"><div id="scheduleStores" class="picker"></div><button class="full" type="submit">Salva programmazione</button></form></section><div id="scheduleList" class="cards"></div></section>
<section id="extrasView" class="view hidden"><button id="newExtraBtn" class="full admin-only">＋ Nuovo extra</button><div id="extrasList" class="cards"></div></section>
<section id="settingsView" class="view hidden"><section class="panel"><h2>Impostazioni</h2><p id="settingsUser"></p><p id="syncStatus" class="muted"></p><button id="refreshBtn" class="secondary">Aggiorna dati</button><button id="seedBtn" class="secondary admin-only">Importa punti vendita iniziali</button><button id="logoutBtn" class="danger-btn">Esci</button></section><div id="cloudAccountSettings"></div></section>
</main></div>
<dialog id="storeDialog"><form id="storeForm"><div class="dialog-head"><h2>Punto vendita</h2><button type="button" data-close>×</button></div><input id="storeId" type="hidden"><label>Nome<input id="storeName" required></label><label>Indirizzo<input id="storeAddress"></label><label>Città<input id="storeCity"></label><label>Ultimo passaggio<input id="storeLast" type="date"></label><label>Intervallo<input id="storeInterval" type="number" value="15"></label><label>Note<textarea id="storeNotes"></textarea></label><button type="submit">Salva</button></form></dialog>
<dialog id="doneDialog"><form id="doneForm"><div class="dialog-head"><h2 id="doneTitle">Intervento</h2><button type="button" data-close>×</button></div><input id="doneStoreId" type="hidden"><input id="doneScheduleItemId" type="hidden"><label>Data<input id="doneDate" type="date" required></label><label>Note<textarea id="doneNotes"></textarea></label><fieldset><legend>Chi ha eseguito</legend><div id="doneWorkers" class="check-grid"></div></fieldset><label class="file-label"><span id="photoLabel">Nessuna foto</span><input id="donePhotos" type="file" accept="image/*" capture="environment" multiple></label><button type="submit">Invia intervento</button></form></dialog>
<dialog id="historyDialog"><div class="dialog-body"><div class="dialog-head"><h2 id="historyTitle">Storico</h2><button type="button" data-close>×</button></div><div id="historyList"></div></div></dialog>
<dialog id="historyEditDialog"><form id="historyEditForm"><div class="dialog-head"><h2>Modifica intervento</h2><button type="button" data-close>×</button></div><input id="historyEditId" type="hidden"><label>Data<input id="historyEditDate" type="date"></label><label>Note<textarea id="historyEditNotes"></textarea></label><div id="historyEditWorkers" class="check-grid"></div><button type="submit">Salva</button></form></dialog>
<dialog id="pendingDialog"><div class="dialog-body"><div class="dialog-head"><h2>Da convalidare</h2><button type="button" data-close>×</button></div><div id="pendingList"></div></div></dialog>
<dialog id="extraDialog"><form id="extraForm"><div class="dialog-head"><h2>Nuovo extra</h2><button type="button" data-close>×</button></div><label>Destinazione<select id="extraDestination"><option value="store">Punto vendita</option><option value="external">Altro luogo</option></select></label><div id="extraStoreWrap"><label>Punto vendita<select id="extraStore"></select></label></div><div id="extraExternalWrap" class="hidden"><label>Nome<input id="extraExternalName"></label><label>Indirizzo<input id="extraExternalAddress"></label></div><label>Titolo<input id="extraTitle" required></label><label>Descrizione<textarea id="extraDescription"></textarea></label><label>Giorno intervento<input id="extraDate" type="date" required></label><fieldset><legend>Squadra</legend><div id="extraWorkers" class="check-grid"></div></fieldset><label>PDF<input id="extraPdf" type="file" accept="application/pdf" required></label><button type="submit">Crea extra</button></form></dialog>
<dialog id="closeExtraDialog"><form id="closeExtraForm"><div class="dialog-head"><h2>Chiudi extra</h2><button type="button" data-close>×</button></div><input id="closeExtraId" type="hidden"><label>Rapportino Eurospin<input id="reportEurospin" type="file" accept="image/*,application/pdf" required></label><label>Rapportino Overgreen<input id="reportOvergreen" type="file" accept="image/*,application/pdf" required></label><button type="submit">Invia per convalida</button></form></dialog>
<div id="toast" class="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js?v=9"></script><script src="app.js?v=9"></script></body></html>
